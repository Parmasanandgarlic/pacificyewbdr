name: Pacific Yew BDR Agent

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bdr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account JSON
        run: |
          mkdir -p creds
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > creds/service_account.json
          python -c "import json; json.load(open('creds/service_account.json')); print('service_account.json is valid JSON')"

      - name: Run BDR Agent
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_ADDRESS: ${{ secrets.SENDER_ADDRESS }}
          SENDER_WEBSITE: ${{ secrets.SENDER_WEBSITE }}
          SEND_LIMIT: ${{ secrets.SEND_LIMIT }}
          QUERIES_PER_RUN: ${{ secrets.QUERIES_PER_RUN }}
        run: python bdr_agent.py
