name: Pacific Yew BDR Agent

on:
  schedule:
    - cron: '0 15 * * *'  # 8 AM PDT daily (GitHub UTC; adjust for DST)
  workflow_dispatch:  # Allow manual triggering

jobs:
  run-bdr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account JSON
        run: |
          mkdir -p creds
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > creds/service_account.json

      - name: Run BDR Agent
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python bdr_agent.py
